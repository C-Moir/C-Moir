<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Social preview - Cameron J. Moir</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1280px;
    height: 640px;
    overflow: hidden;
  }
  body {
    background: #080810;
    color: #e5e7eb;
    font-family: 'Inter', -apple-system, sans-serif;
    position: relative;
    padding: 88px 96px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }

  /* Layered backgrounds */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.022) 1px, transparent 1px);
    background-size: 56px 56px;
    pointer-events: none;
  }
  .glow {
    position: absolute;
    width: 1100px;
    height: 1100px;
    background: radial-gradient(circle, rgba(99,102,241,0.25) 0%, rgba(99,102,241,0.06) 35%, transparent 55%);
    top: -440px;
    right: -380px;
    pointer-events: none;
    filter: blur(10px);
  }
  .bottom-fade {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 220px;
    background: linear-gradient(to top, #0a0a16 0%, transparent 100%);
    pointer-events: none;
  }
  /* Small indigo accent dots in the top-left corner area */
  .dots {
    position: absolute;
    top: 80px;
    left: 96px;
    display: flex;
    gap: 6px;
    z-index: 1;
  }
  .dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #818cf8;
    box-shadow: 0 0 12px rgba(129,140,248,0.6);
  }
  .dots span:nth-child(1) { opacity: 1; }
  .dots span:nth-child(2) { opacity: 0.6; }
  .dots span:nth-child(3) { opacity: 0.3; }

  .top-row {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding-top: 24px;
  }

  .handle {
    color: #818cf8;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .logo {
    width: 340px;
    height: auto;
    opacity: 0.95;
    filter: drop-shadow(0 0 30px rgba(129,140,248,0.35));
  }

  .main {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 96px;
  }

  .name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 168px;
    font-weight: 700;
    letter-spacing: -0.055em;
    color: white;
    line-height: 0.86;
    text-transform: uppercase;
  }
  .name .last {
    color: #c7d2fe;
  }

  .info-stack {
    text-align: right;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 20px;
    line-height: 1.9;
    color: #cbd5e1;
    border-right: 2px solid #818cf8;
    padding-right: 28px;
    padding-top: 4px;
    padding-bottom: 4px;
  }
  .info-stack .line { display: block; }
  .info-stack .label {
    color: #64748b;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    margin-bottom: 2px;
    margin-top: 14px;
  }
  .info-stack .label:first-child { margin-top: 0; }
  .info-stack .value {
    color: #e5e7eb;
    font-weight: 500;
  }
  .info-stack a, .info-stack .value { color: #e5e7eb; text-decoration: none; }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow"></div>
  <div class="bottom-fade"></div>
  <div class="dots"><span></span><span></span><span></span></div>

  <div class="top-row">
    <div class="handle">github.com/C-Moir</div>
    <img class="logo" src="streamables-logo-cropped.png" alt="Streamables.live" />
  </div>

  <div class="main">
    <div class="name">
      Cameron<br/>
      <span class="last">J. Moir</span>
    </div>
    <div class="info-stack">
      <div class="label">Based</div>
      <div class="value">Brisbane, Australia</div>
      <div class="label">Web</div>
      <div class="value">streamables.live</div>
      <div class="label">X</div>
      <div class="value">@CameronMoir13</div>
      <div class="value">@X_Streamables</div>
    </div>
  </div>
</body>
</html>
