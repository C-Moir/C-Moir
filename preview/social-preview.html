<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Social preview - Cameron J. Moir</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1280px;
    height: 640px;
    overflow: hidden;
  }
  body {
    background: #080810;
    color: #e5e7eb;
    font-family: 'Inter', -apple-system, sans-serif;
    position: relative;
    padding: 72px 84px;
    display: grid;
    grid-template-rows: auto 1fr;
    row-gap: 0;
  }

  /* Layer 1: Faint base grid for depth */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size: 56px 56px;
    pointer-events: none;
  }

  /* Layer 2: Circuit trace backdrop - procedurally generated PCB-style
     orthogonal traces + component rectangles in indigo. Held at low
     opacity so it reads as texture, not decoration. */
  .circuit {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0.22;
    pointer-events: none;
  }

  /* Layer 3: Indigo glows */
  .glow-1 {
    position: absolute;
    width: 1200px;
    height: 1200px;
    background: radial-gradient(circle, rgba(99,102,241,0.32) 0%, rgba(99,102,241,0.08) 32%, transparent 55%);
    top: -500px;
    right: -420px;
    pointer-events: none;
    filter: blur(10px);
  }
  .glow-2 {
    position: absolute;
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(129,140,248,0.16) 0%, transparent 60%);
    bottom: -220px;
    left: -160px;
    pointer-events: none;
    filter: blur(20px);
  }

  /* Layer 4: Soft dark mask over the circuit in the center so text
     stays readable while edges still show the circuit pattern. */
  .vignette {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(8,8,16,0.55) 0%, rgba(8,8,16,0.2) 50%, transparent 75%);
    pointer-events: none;
  }

  /* Layer 5: Bottom fade */
  .bottom-fade {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 220px;
    background: linear-gradient(to top, #0a0a16 0%, transparent 100%);
    pointer-events: none;
  }

  /* Top-left accent dots */
  .dots {
    position: absolute;
    top: 88px;
    left: 84px;
    display: flex;
    gap: 7px;
    z-index: 2;
  }
  .dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #818cf8;
    box-shadow: 0 0 14px rgba(129,140,248,0.75);
  }
  .dots span:nth-child(1) { opacity: 1; }
  .dots span:nth-child(2) { opacity: 0.6; }
  .dots span:nth-child(3) { opacity: 0.3; }

  .top-row {
    position: relative;
    z-index: 2;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding-top: 32px;
  }

  .handle {
    color: #818cf8;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 21px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  .logo-corner {
    width: 230px;
    height: auto;
    filter: drop-shadow(0 0 24px rgba(129,140,248,0.4));
  }

  /* Main row: avatar + name + info stack */
  .main {
    position: relative;
    z-index: 2;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 48px;
    align-self: center;      /* Centre vertically in the 1fr row */
    justify-self: stretch;
    width: 100%;
  }

  .avatar-wrap {
    width: 210px;
    height: 210px;
    border-radius: 50%;
    padding: 4px;
    background: linear-gradient(135deg, #818cf8 0%, rgba(129,140,248,0.3) 70%, transparent 100%);
    box-shadow: 0 0 40px rgba(129,140,248,0.35), 0 0 0 1px rgba(255,255,255,0.04);
    flex-shrink: 0;
  }
  .avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
  }

  .name {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    letter-spacing: -0.055em;
    color: white;
    line-height: 0.88;
    text-transform: uppercase;
  }
  .name .line-1 {
    display: block;
    font-size: 104px;
  }
  .name .line-1 .initial {
    color: #818cf8;
    padding-left: 14px;
  }
  .name .line-2 {
    display: block;
    font-size: 104px;
    color: #c7d2fe;
  }

  .info-stack {
    text-align: right;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 17px;
    line-height: 1.85;
    color: #cbd5e1;
    border-right: 2px solid #818cf8;
    padding-right: 22px;
    min-width: 220px;
  }
  .info-stack .label {
    color: #64748b;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 600;
    font-family: 'Inter', sans-serif;
    margin-bottom: 2px;
    margin-top: 14px;
  }
  .info-stack .label:first-child { margin-top: 0; }
  .info-stack .value {
    color: #e5e7eb;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="grid-bg"></div>
  <img class="circuit" src="circuit.svg" alt="" />
  <div class="glow-1"></div>
  <div class="glow-2"></div>
  <div class="vignette"></div>
  <div class="bottom-fade"></div>
  <div class="dots"><span></span><span></span><span></span></div>

  <div class="top-row">
    <div class="handle">github.com/C-Moir</div>
    <img class="logo-corner" src="streamables-logo-cropped.png" alt="Streamables.live" />
  </div>

  <div class="main">
    <div class="avatar-wrap">
      <img class="avatar" src="avatar.png" alt="Cameron J. Moir" />
    </div>
    <div class="name">
      <span class="line-1">Cameron<span class="initial">J.</span></span>
      <span class="line-2">Moir</span>
    </div>
    <div class="info-stack">
      <div class="label">Based</div>
      <div class="value">Brisbane, AU</div>
      <div class="label">Web</div>
      <div class="value">streamables.live</div>
      <div class="label">On X</div>
      <div class="value">@CameronMoir13</div>
      <div class="value">@X_Streamables</div>
    </div>
  </div>
</body>
</html>
