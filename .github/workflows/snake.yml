# Generates a contribution-grid-snake SVG nightly and pushes the
# output to the `output` branch. The README references those SVGs
# via raw.githubusercontent.com so the animation refreshes as new
# contributions land on the profile.
name: Generate Snake

on:
  schedule:
    # Runs at 00:00 UTC every day (10:00 AEST, 11:00 AEDT).
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push SVGs to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
